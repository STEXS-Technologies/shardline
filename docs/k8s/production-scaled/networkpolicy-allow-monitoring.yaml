apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shardline-allow-monitoring
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - api
          - transfer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              shardline.io/monitoring: "true"
      ports:
        - protocol: TCP
          port: 8080
