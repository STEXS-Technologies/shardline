apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shardline-allow-same-namespace-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - api
          - transfer
          - postgres
          - minio
          - garnet
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shardline-e2e
