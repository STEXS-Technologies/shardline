apiVersion: v1
kind: Secret
metadata:
  name: shardline-runtime
type: Opaque
stringData:
  index-postgres-url: postgres://shardline:shardline@postgres:5432/shardline
  reconstruction-cache-url: redis://garnet:6379
  s3-access-key-id: minio
  s3-secret-access-key: minio123456
  token-signing-key: local-shardline-signing-key
  metrics-token: local-metrics-scrape-token
  provider-api-key: local-provider-bootstrap-key
