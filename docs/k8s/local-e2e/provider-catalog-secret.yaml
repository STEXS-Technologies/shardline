apiVersion: v1
kind: Secret
metadata:
  name: shardline-provider-catalog
type: Opaque
stringData:
  providers.json: |
    {
      "providers": [
        {
          "kind": "generic",
          "integration_subject": "generic-e2e",
          "webhook_secret": "local-webhook-secret",
          "repositories": [
            {
              "owner": "team",
              "name": "assets",
              "visibility": "private",
              "default_revision": "main",
              "clone_url": "https://example.invalid/team/assets.git",
              "read_subjects": ["operator"],
              "write_subjects": ["operator"]
            }
          ]
        }
      ]
    }
