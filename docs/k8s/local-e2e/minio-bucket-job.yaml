apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -ec
            - |
              until /usr/bin/mc alias set local http://minio:9000 minio minio123456; do
                sleep 2
              done
              /usr/bin/mc mb --ignore-existing local/shardline
