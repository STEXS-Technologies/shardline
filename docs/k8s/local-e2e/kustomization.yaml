apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shardline-e2e

resources:
  - ../production-scaled
  - runtime-secret.yaml
  - provider-catalog-secret.yaml
  - networkpolicy-default-deny-egress.yaml
  - networkpolicy-allow-dns.yaml
  - networkpolicy-allow-same-namespace-ingress.yaml
  - networkpolicy-allow-shardline-egress.yaml
  - postgres.yaml
  - postgres-service.yaml
  - minio.yaml
  - minio-service.yaml
  - minio-bucket-job.yaml
  - garnet.yaml
  - garnet-service.yaml
  - migration-job.yaml

patches:
  - target:
      kind: Namespace
      name: shardline
    patch: |-
      - op: replace
        path: /metadata/name
        value: shardline-e2e
  - target:
      kind: ConfigMap
      name: shardline-config
    patch: |-
      - op: replace
        path: /data/SHARDLINE_PUBLIC_BASE_URL
        value: http://127.0.0.1:18080
      - op: replace
        path: /data/SHARDLINE_S3_BUCKET
        value: shardline
      - op: replace
        path: /data/SHARDLINE_S3_REGION
        value: us-east-1
      - op: replace
        path: /data/SHARDLINE_S3_ENDPOINT
        value: http://minio:9000
      - op: replace
        path: /data/SHARDLINE_S3_ALLOW_HTTP
        value: "true"
  - target:
      kind: Deployment
      name: shardline-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: shardline:e2e
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: shardline:e2e
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: shardline-transfer
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: shardline:e2e
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: shardline:e2e
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: CronJob
      name: shardline-gc
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: shardline:e2e
  - target:
      kind: Job
      name: shardline-migrate
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: shardline:e2e
  - target:
      kind: HorizontalPodAutoscaler
      name: shardline-api
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 10
      - op: replace
        path: /spec/metrics/1/resource/target/averageUtilization
        value: 70
  - target:
      kind: HorizontalPodAutoscaler
      name: shardline-transfer
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 10
      - op: replace
        path: /spec/metrics/1/resource/target/averageUtilization
        value: 70
  - target:
      kind: Ingress
      name: shardline
    patch: |-
      - op: remove
        path: /spec/tls
      - op: remove
        path: /spec/rules/0/host
